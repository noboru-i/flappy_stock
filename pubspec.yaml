name: flappy_stock
description: "Flappy Stock built with Flutter + Flame"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.11.0
  flutter: "3.41.2"

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.28.1
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.2
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/pipes/
    - assets/images/
