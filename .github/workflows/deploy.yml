name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: 'pubspec.yaml'
          channel: 'stable'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install FlutterFire CLI
        run: dart pub global activate flutterfire_cli

      - name: Generate firebase_options.dart
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLAPPY_STOCK_PROD }}' > /tmp/sa.json
          dart pub global run flutterfire_cli:flutterfire configure --project=flappy-stock-prod --platforms=web --yes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json

      - name: Build Flutter web
        run: make build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLAPPY_STOCK_PROD }}
          projectId: flappy-stock-prod
          channelId: live
