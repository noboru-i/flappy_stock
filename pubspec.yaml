name: flappy_stock
description: "Flappy Stock built with Flutter + Flame"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.11.0
  flutter: "3.41.2"

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.35.1
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.2
  firebase_core: ^4.5.0
  firebase_analytics: ^12.1.3
  firebase_auth: ^6.2.0
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.1.3
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/pipes/
    - assets/data/news/
    - assets/images/
